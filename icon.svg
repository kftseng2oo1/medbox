<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 背景漸層 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d4f4a"/>
      <stop offset="50%" style="stop-color:#0f766e"/>
      <stop offset="100%" style="stop-color:#134e4a"/>
    </linearGradient>
    <!-- 背景光暈 -->
    <radialGradient id="glow1" cx="75%" cy="25%" r="50%">
      <stop offset="0%" style="stop-color:#6edec7;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#6edec7;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#0f766e;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:0"/>
    </radialGradient>
    <!-- 膠囊左半漸層（白色）-->
    <linearGradient id="leftCap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="40%" style="stop-color:#f0fffe"/>
      <stop offset="100%" style="stop-color:#e0f7f4"/>
    </linearGradient>
    <!-- 膠囊右半漸層（紅色）-->
    <linearGradient id="rightCap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="50%" style="stop-color:#ee4444"/>
      <stop offset="100%" style="stop-color:#cc2222"/>
    </linearGradient>
    <!-- 膠囊高光 -->
    <radialGradient id="capHL" cx="30%" cy="25%" r="55%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.55"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
    <!-- 右半高光 -->
    <radialGradient id="rightHL" cx="65%" cy="25%" r="50%">
      <stop offset="0%" style="stop-color:#ffcccc;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#ff6464;stop-opacity:0"/>
    </radialGradient>
    <!-- 裁切膠囊形狀 -->
    <clipPath id="capClip">
      <rect x="107" y="185" width="298" height="142" rx="71" ry="71"/>
    </clipPath>
    <!-- 陰影濾鏡 -->
    <filter id="capShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" fill="url(#bgGrad)"/>
  <rect width="512" height="512" fill="url(#glow1)"/>
  <rect width="512" height="512" fill="url(#glow2)"/>

  <!-- 膠囊（旋轉 -30 度，以中心點 256,256 旋轉）-->
  <g transform="rotate(-30, 256, 256)" filter="url(#capShadow)">
    <!-- 膠囊底色（整體）-->
    <rect x="107" y="185" width="298" height="142" rx="71" ry="71" fill="#ffffff"/>
    <!-- 左半填充 -->
    <rect x="107" y="185" width="149" height="142" fill="url(#leftCap)" clip-path="url(#capClip)"/>
    <!-- 右半填充 -->
    <rect x="256" y="185" width="149" height="142" fill="url(#rightCap)" clip-path="url(#capClip)"/>
    <!-- 高光層 -->
    <rect x="107" y="185" width="298" height="142" rx="71" ry="71" fill="url(#capHL)"/>
    <!-- 右半高光 -->
    <rect x="256" y="185" width="149" height="142" fill="url(#rightHL)" clip-path="url(#capClip)"/>
    <!-- 膠囊邊框 -->
    <rect x="107" y="185" width="298" height="142" rx="71" ry="71"
          fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="3.5"/>
    <!-- 中線分隔 -->
    <line x1="256" y1="182" x2="256" y2="330"
          stroke="rgba(255,255,255,0.6)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- 右上角裝飾點 -->
  <circle cx="368" cy="102" r="11" fill="#6edec7" opacity="0.7"/>
  <circle cx="400" cy="143" r="7" fill="#6edec7" opacity="0.45"/>
  <circle cx="348" cy="72" r="5.5" fill="#6edec7" opacity="0.35"/>
  <circle cx="420" cy="103" r="4.5" fill="#6edec7" opacity="0.25"/>

  <!-- 底部「藥」字 -->
  <text x="256" y="432"
        font-family="'Noto Serif TC', 'PingFang TC', 'Heiti TC', serif"
        font-size="66" font-weight="900"
        text-anchor="middle"
        fill="rgba(110,222,199,0.9)"
        filter="url(#textGlow)">藥</text>

  <!-- 底部細線裝飾 -->
  <line x1="179" y1="456" x2="333" y2="456"
        stroke="rgba(110,222,199,0.25)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
